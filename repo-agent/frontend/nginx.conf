# nginx config for the RepoAgent SPA.
# Serves the Angular build and reverse-proxies /api to the backend with
# SSE-safe settings (no buffering, long read timeout).

upstream repo_agent_backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST + SSE proxy. SSE requires buffering off + a long read timeout.
    location /api/ {
        proxy_pass http://repo_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        chunked_transfer_encoding on;
    }
}
