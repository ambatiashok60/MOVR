<div class="ai-workspace">
  <header class="ai-workspace__header">
    <app-workspace-header
      [workspaceName]="facade.store.selectedRepository()?.name || ''"
      [mode]="facade.store.mode()"
      [modelName]="facade.store.bootstrap()?.models?.runtime?.selectedModelId"
      [syncedAt]="facade.store.selectedBranch()?.syncedAt"
    />

    <div class="ai-workspace__selectors">
      <p-dropdown
        [options]="facade.store.repositories()"
        optionLabel="name"
        [ngModel]="facade.store.selectedRepository()"
        (ngModelChange)="onRepositoryChange($event)"
        placeholder="Select repository"
      />
      <p-dropdown
        [options]="facade.store.branches()"
        optionLabel="name"
        [ngModel]="facade.store.selectedBranch()"
        (ngModelChange)="onBranchChange($event)"
        placeholder="Select branch"
      />
      <p-button label="Refresh" icon="pi pi-refresh" [outlined]="true" (onClick)="refresh()" />
      <p-button icon="pi pi-cog" [text]="true" (onClick)="facade.toggleSettings()" />
    </div>
  </header>

  <app-workspace-selector
    class="ai-workspace__path-entry"
    [workspace]="facade.store.workspace()"
    (pathSubmitted)="facade.validateWorkspacePath($event)"
  />

  <app-mode-toggle
    class="ai-workspace__mode-toggle"
    [mode]="facade.store.mode()"
    (modeChange)="facade.setMode($event)"
  />

  <div class="ai-workspace__body">
    <aside class="ai-workspace__panel ai-workspace__panel--left">
      <p-tabView (onChange)="onTabChange($event.index)">
        <p-tabPanel header="Repository Explorer">
          <p-tree
            [value]="treeNodes()"
            selectionMode="single"
            (onNodeSelect)="onFileSelect($event)"
            class="ai-workspace__file-tree"
          />
        </p-tabPanel>
        <p-tabPanel header="History">
          <app-session-list
            [sessions]="facade.store.sessions()"
            [activeSessionId]="facade.store.session()?.id ?? null"
            (select)="facade.resumeSession($event.id)"
          />
        </p-tabPanel>
        <p-tabPanel header="Prompts">
          <app-prompt-library [prompts]="facade.store.prompts()" (select)="onPromptSelected($event)" />
        </p-tabPanel>
      </p-tabView>

      <app-selected-files-panel
        [files]="facade.store.contextSummary()?.files || []"
        (removeFile)="facade.removeContextFile($event)"
      />
      <app-context-panel [context]="facade.store.contextSummary()" />
    </aside>

    <section class="ai-workspace__panel ai-workspace__panel--center">
      <app-chat-input
        [isRunning]="facade.store.isRunning()"
        [selectedFilePath]="selectedFilePath"
        [quickActions]="quickActions"
        [prefillValue]="prefillValue"
        (run)="facade.submitPrompt($event)"
      />

      <app-conversation [messages]="facade.store.messages()" />

      @if (facade.store.execution(); as execution) {
        <app-execution-timeline [execution]="execution" />
        <app-agent-plan [plan]="facade.store.agentPlan()" />
      }
    </section>

    <aside class="ai-workspace__panel ai-workspace__panel--right">
      <app-review-panel
        [fileChanges]="facade.store.fileChanges()"
        [selectedFileChange]="facade.selectors.selectedFileChange()"
        [keptCount]="facade.selectors.keptCount()"
        [rejectedCount]="facade.selectors.rejectedCount()"
        [selectableFileCount]="facade.selectors.selectableFileCount()"
        (selectFile)="facade.selectFileChange($event)"
        (decisionChange)="onFileDecision($event)"
        (apply)="facade.applyChanges($event)"
      />
    </aside>
  </div>

  @if (facade.store.showSettings()) {
    <div class="ai-workspace__settings-overlay" (click)="facade.toggleSettings()">
      <div class="ai-workspace__settings-panel" (click)="$event.stopPropagation()">
        <app-ai-workspace-settings
          [modelRegistry]="facade.store.bootstrap()?.models ?? null"
          [toolRegistry]="facade.store.bootstrap()?.tools ?? null"
          [preferences]="facade.store.bootstrap()?.preferences ?? null"
          (save)="onSettingsSave($event)"
        />
      </div>
    </div>
  }
</div>
