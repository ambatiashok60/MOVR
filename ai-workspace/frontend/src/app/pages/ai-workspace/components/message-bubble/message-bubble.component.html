<div class="message-bubble" [class.message-bubble--assistant]="message.role !== 'user'">
  <div class="message-bubble__avatar">{{ message.role === 'user' ? 'AK' : '✨' }}</div>
  <div class="message-bubble__body">
    <div class="message-bubble__author">
      {{ message.role === 'user' ? 'You' : message.role === 'system' ? 'System' : 'AI Workspace' }}
    </div>
    <app-markdown-renderer [markdown]="message.content" />
    <span class="message-bubble__time">{{ message.createdAt | timeAgo }}</span>
  </div>
</div>
