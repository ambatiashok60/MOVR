<div class="workspace-selector">
  <input
    type="text"
    pInputText
    placeholder="/path/to/local/repository"
    [(ngModel)]="pathInput"
    (keydown.enter)="submit()"
  />
  <p-button label="Validate" icon="pi pi-check" (onClick)="submit()" />

  @if (workspace?.validationState === 'invalid') {
    <span class="workspace-selector__error">{{ workspace?.validationMessage || 'Invalid path' }}</span>
  }
  @if (workspace?.validationState === 'valid') {
    <span class="workspace-selector__success">
      <i class="pi pi-check-circle"></i> {{ workspace?.repository?.name }}
    </span>
  }
</div>
