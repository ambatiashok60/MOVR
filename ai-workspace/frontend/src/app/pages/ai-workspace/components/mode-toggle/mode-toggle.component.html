<div class="mode-toggle">
  <button
    type="button"
    class="mode-toggle__tab"
    [class.mode-toggle__tab--active]="mode === 'ask'"
    (click)="select('ask')"
  >
    <i class="pi pi-comment"></i> Ask
  </button>
  <button
    type="button"
    class="mode-toggle__tab"
    [class.mode-toggle__tab--active]="mode === 'agent'"
    (click)="select('agent')"
  >
    <i class="pi pi-android"></i> Agent
  </button>
</div>
