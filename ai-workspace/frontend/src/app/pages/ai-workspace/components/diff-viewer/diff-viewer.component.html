@if (fileChange) {
  <div class="diff-viewer">
    @for (hunk of fileChange.diffHunks; track hunk.header) {
      <div class="diff-viewer__hunk-header">{{ hunk.header }}</div>
      @for (line of hunk.lines; track $index) {
        <div
          class="diff-viewer__line"
          [class.diff-viewer__line--added]="line.type === 'added'"
          [class.diff-viewer__line--removed]="line.type === 'removed'"
        >
          <span class="diff-viewer__line-no">{{ line.oldLineNumber }}</span>
          <span class="diff-viewer__line-no">{{ line.newLineNumber }}</span>
          <span class="diff-viewer__line-content">{{ line.content }}</span>
        </div>
      }
    }
  </div>
} @else {
  <div class="diff-viewer__empty">Select a changed file to view its diff.</div>
}
