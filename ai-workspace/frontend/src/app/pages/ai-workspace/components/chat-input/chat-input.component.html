<div class="chat-input">
  <input
    type="text"
    pInputText
    placeholder="Describe what you want to build, refactor or fix..."
    [(ngModel)]="value"
    (keydown.enter)="submit()"
  />

  <div class="chat-input__actions">
    @for (action of quickActions; track action.label) {
      <p-button
        [label]="action.label"
        [icon]="action.icon"
        [outlined]="true"
        size="small"
        (onClick)="applyQuickAction(action)"
      />
    }
    <p-button
      label="Run"
      icon="pi pi-play"
      [loading]="isRunning"
      (onClick)="submit()"
      styleClass="chat-input__run-button"
    />
  </div>
</div>
