@if (fileChanges.length) {
  <div class="review-panel">
    <div class="review-panel__header">
      <span>Changes</span>
      <p-badge [value]="fileChanges.length.toString()" />
      <span class="review-panel__kept">{{ keptCount }} kept</span>
      <span class="review-panel__rejected">{{ rejectedCount }} rejected</span>
      <p-button label="Review Summary" [outlined]="true" size="small" />
    </div>

    <div class="review-panel__files">
      @for (file of fileChanges; track file.id) {
        <app-file-change-card
          [file]="file"
          [selected]="selectedFileChange?.id === file.id"
          (select)="selectFile.emit(file.id)"
          (decisionChange)="decisionChange.emit({ fileId: file.id, decision: $event })"
        />
      }
    </div>

    <app-diff-viewer [fileChange]="selectedFileChange" />

    <footer class="review-panel__footer">
      <span>
        {{ selectableFileCount }} files selected
        <small>Only kept files will be applied to the repository.</small>
      </span>
      <p-splitButton
        label="Apply Changes"
        icon="pi pi-check"
        [model]="applyMenuItems"
        (onClick)="apply.emit(false)"
      />
    </footer>
  </div>
} @else {
  <div class="review-panel__empty">
    <i class="pi pi-file-check"></i>
    <p>Run the agent to see proposed changes here.</p>
  </div>
}
