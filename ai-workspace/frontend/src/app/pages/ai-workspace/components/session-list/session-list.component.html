<ul class="session-list">
  @for (session of sessions; track session.id) {
    <app-session-card
      [session]="session"
      [active]="session.id === activeSessionId"
      (select)="select.emit(session)"
    />
  } @empty {
    <li class="session-list__empty">No previous sessions yet.</li>
  }
</ul>
