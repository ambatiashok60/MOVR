<div class="ai-workspace-settings">
  <section>
    <h3>Model</h3>
    <p-dropdown
      [options]="modelRegistry?.models ?? []"
      optionLabel="displayName"
      optionValue="id"
      [(ngModel)]="selectedModelId"
      placeholder="Select a model"
    />
  </section>

  <section>
    <h3>Tools</h3>
    @for (tool of toolRegistry?.tools ?? []; track tool.id) {
      <div class="ai-workspace-settings__tool-row">
        <p-checkbox
          [binary]="true"
          [ngModel]="enabledToolIds.includes(tool.id)"
          (ngModelChange)="toggleTool(tool.id, $event)"
        />
        <span>{{ tool.name }}</span>
        <small>{{ tool.description }}</small>
      </div>
    }
  </section>

  <p-button label="Save" icon="pi pi-check" (onClick)="submit()" />
</div>
