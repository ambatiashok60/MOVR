<header class="topbar">
  <div class="topbar__titles">
    <h1>{{ title }} <i class="pi pi-sparkles"></i></h1>
    @if (subtitle) {
      <p>{{ subtitle }}</p>
    }
  </div>

  <div class="topbar__actions">
    <p-button label="Usage" icon="pi pi-chart-line" [outlined]="true" />
    <button type="button" class="topbar__icon-button" aria-label="Help">
      <i class="pi pi-question-circle"></i>
    </button>
    <button type="button" class="topbar__icon-button" aria-label="Notifications">
      <i class="pi pi-bell"></i>
      @if (notificationCount > 0) {
        <p-badge [value]="notificationCount.toString()" severity="danger" />
      }
    </button>
    @if (user) {
      <div class="topbar__user">
        <div class="topbar__avatar">{{ user.initials }}</div>
      </div>
    }
  </div>
</header>
