<nav class="sidebar">
  <div class="sidebar__brand">
    <i class="pi pi-bolt"></i>
    <span>WORKTOP</span>
  </div>

  <ul class="sidebar__nav">
    @for (item of navItems; track item.routerLink) {
      <li>
        <a
          [routerLink]="item.routerLink"
          routerLinkActive="sidebar__link--active"
          class="sidebar__link"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
          @if (item.badge) {
            <span class="sidebar__badge">{{ item.badge }}</span>
          }
        </a>
        @if (item.children?.length) {
          <ul class="sidebar__children">
            @for (child of item.children; track child.routerLink) {
              <li><a [routerLink]="child.routerLink" routerLinkActive="sidebar__child--active" class="sidebar__child"><i [class]="child.icon"></i><span>{{ child.label }}</span></a></li>
            }
          </ul>
        }
      </li>
    }
  </ul>

  <a routerLink="/settings" routerLinkActive="sidebar__link--active" class="sidebar__link sidebar__settings">
    <i class="pi pi-cog"></i>
    <span>Settings</span>
  </a>
</nav>
